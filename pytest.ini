[pytest]
markers =
    adapter_contract: Phase 14 adapter contract tests (tests/adapters/) — run with -m adapter_contract

testpaths = tests

# Phase 14 Plan 01 Task 03 Rule 3 deviation — ignore pre-existing D08-DEF-01
# cross-phase import errors in tests/phase08/mocks/ + tests/phase12/test_supervisor_compress.py.
# These files use `from mocks.X import Y` which requires sys.path manipulation that
# runs at collection-import time; with testpaths=tests, a bare `pytest` invocation
# now tries to collect them and ImportError. Pre-existing per STATE.md Session #21
# (2026-04-19) + Phase 8 deferred-items.md. Not caused by Phase 14 changes.
# Wave 1 (Plan 14-02) does not touch these files; Wave 4 phase-gate sweep
# explicitly enumerates tests/phase05 tests/phase06 tests/phase07 paths per
# 14-VALIDATION.md row 14-05-01 (independent of addopts).
addopts =
    --strict-markers
    --ignore=tests/phase08/mocks
    --ignore=tests/phase08/test_full_publish_chain_mocked.py
    --ignore=tests/phase08/test_pinned_comment.py
    --ignore=tests/phase08/test_smoke_cleanup.py
    --ignore=tests/phase08/test_uploader_mocked_e2e.py
    --ignore=tests/phase12/test_supervisor_compress.py
