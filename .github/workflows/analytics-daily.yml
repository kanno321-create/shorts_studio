name: analytics-daily
# KPI-01 — YouTube Analytics v2 daily fetch (Phase 10 Plan 04)
# cron: UTC 20:00 = KST 05:00 (다음날 새벽)
# RESEARCH Pitfall 1: GH Actions cron 은 피크 타임에 10~30분 지연될 수 있음 (known issue
# actions/runner #156282). 일 단위 fetch 는 수용 가능.

on:
  schedule:
    - cron: '0 20 * * *'   # UTC 20:00 = KST 05:00 (+9h)
  workflow_dispatch:
    inputs:
      video_ids:
        description: 'Comma-separated YouTube video IDs (override RECENT_VIDEO_IDS secret)'
        required: false

permissions:
  contents: write   # kpi_log.md + data/kpi_daily/*.csv commit

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install google-api-python-client google-auth-oauthlib
      - name: Restore OAuth token from secrets
        env:
          YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
        run: |
          mkdir -p config
          # $YOUTUBE_CLIENT_SECRET 과 $YOUTUBE_TOKEN_JSON 은 base64 가 아닌 JSON 원문.
          # GH secrets 등록 시 JSON 전체를 줄바꿈 포함 그대로 붙여넣기.
          printf '%s' "$YOUTUBE_CLIENT_SECRET" > config/client_secret.json
          printf '%s' "$YOUTUBE_TOKEN_JSON" > config/youtube_token.json
      - name: Fetch daily KPI
        env:
          VIDEO_IDS: ${{ github.event.inputs.video_ids || secrets.RECENT_VIDEO_IDS }}
        run: |
          if [ -z "$VIDEO_IDS" ]; then
            echo "::warning::RECENT_VIDEO_IDS secret 비어 있음 — fetch skip (Phase 10 최초 업로드 전까지 정상)"
            exit 0
          fi
          mkdir -p data/kpi_daily
          python -m scripts.analytics.fetch_kpi \
            --video-ids "$VIDEO_IDS" \
            --output-dir data/kpi_daily
      - name: Commit kpi_log
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/kpi_daily/ wiki/shorts/kpi_log.md 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore(kpi): daily fetch $(date -u +%Y-%m-%d)"
          git push || true
